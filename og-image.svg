<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#1f232c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5b9dff"/>
      <stop offset="100%" stop-color="#7eb4ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>

  <text x="80" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="28" font-weight="500" letter-spacing="4" fill="#5b9dff" text-transform="uppercase">LLM TOPS CALCULATOR</text>

  <text x="80" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="76" font-weight="700" fill="#e6e8ec">How many TOPS does it really</text>
  <text x="80" y="368" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="76" font-weight="700" fill="#e6e8ec">take to run a local LLM?</text>

  <text x="80" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="26" font-weight="400" fill="#9aa3b2">Estimate compute and memory bandwidth needs across</text>
  <text x="80" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="26" font-weight="400" fill="#9aa3b2">Llama, Mistral, Qwen, DeepSeek, Gemma and more.</text>

  <text x="80" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="500" fill="#5b9dff">Apple Silicon · NVIDIA · AMD · Copilot+ PC NPUs</text>

  <!-- Chip illustration — pure SVG paths, renders identically on every platform.
       Positioned in the bottom-right corner. -->
  <g transform="translate(990, 200)">
    <!-- pins (top, bottom, left, right) -->
    <g fill="#5b9dff" opacity="0.85">
      <!-- top -->
      <rect x="22"  y="-20" width="14" height="22" rx="2"/>
      <rect x="55"  y="-20" width="14" height="22" rx="2"/>
      <rect x="88"  y="-20" width="14" height="22" rx="2"/>
      <rect x="121" y="-20" width="14" height="22" rx="2"/>
      <!-- bottom -->
      <rect x="22"  y="178" width="14" height="22" rx="2"/>
      <rect x="55"  y="178" width="14" height="22" rx="2"/>
      <rect x="88"  y="178" width="14" height="22" rx="2"/>
      <rect x="121" y="178" width="14" height="22" rx="2"/>
      <!-- left -->
      <rect x="-20" y="22"  width="22" height="14" rx="2"/>
      <rect x="-20" y="55"  width="22" height="14" rx="2"/>
      <rect x="-20" y="88"  width="22" height="14" rx="2"/>
      <rect x="-20" y="121" width="22" height="14" rx="2"/>
      <!-- right -->
      <rect x="158" y="22"  width="22" height="14" rx="2"/>
      <rect x="158" y="55"  width="22" height="14" rx="2"/>
      <rect x="158" y="88"  width="22" height="14" rx="2"/>
      <rect x="158" y="121" width="22" height="14" rx="2"/>
    </g>

    <!-- chip body -->
    <rect x="0" y="0" width="158" height="178" rx="14" fill="#171a21" stroke="#5b9dff" stroke-width="4"/>

    <!-- inner die outline -->
    <rect x="22" y="32" width="114" height="114" rx="6" fill="none" stroke="#5b9dff" stroke-width="2" opacity="0.4"/>

    <!-- "TOPS" label -->
    <text x="79" y="106" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
          font-size="36" font-weight="800" text-anchor="middle" fill="#5b9dff" letter-spacing="2">TOPS</text>
  </g>
</svg>
